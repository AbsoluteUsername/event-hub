<app-glass-panel>
  <h2 class="section-title">Events</h2>

  <div class="table-container">
    @if (loading$ | async) {
      <mat-progress-bar mode="indeterminate"
                        class="table-loading-bar"
                        aria-label="Loading events">
      </mat-progress-bar>
    }

    @if ((loading$ | async) === false && (events$ | async)?.length === 0) {
      @if (hasActiveFilters()) {
        <app-empty-state mode="no-results"
                         [layout]="isMobile() ? 'stacked' : 'side-by-side'"
                         (clearFilters)="onClearFilters()">
        </app-empty-state>
      } @else {
        <app-empty-state mode="no-data"
                         [layout]="isMobile() ? 'stacked' : 'side-by-side'">
        </app-empty-state>
      }
    } @else {
      <div class="table-wrapper" [class.loading]="loading$ | async">
        <table mat-table columnResize [dataSource]="(events$ | async) ?? []" matSort
               [trackBy]="trackById"
               (matSortChange)="onSortChange($event)"
               matSortActive="createdAt" matSortDirection="desc">

          <!-- Id Column -->
          <ng-container matColumnDef="id">
            <th mat-header-cell *matHeaderCellDef mat-sort-header resizable [matResizableMinWidthPx]="60">Id</th>
            <td mat-cell *matCellDef="let row">
              <span class="mono" [matTooltip]="row.id">{{ row.id }}</span>
            </td>
          </ng-container>

          <!-- UserId Column -->
          <ng-container matColumnDef="userId">
            <th mat-header-cell *matHeaderCellDef mat-sort-header resizable [matResizableMinWidthPx]="80">UserId</th>
            <td mat-cell *matCellDef="let row">
              <span class="mono">{{ row.userId }}</span>
            </td>
          </ng-container>

          <!-- Type Column -->
          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef mat-sort-header resizable [matResizableMinWidthPx]="80">Type</th>
            <td mat-cell *matCellDef="let row">
              <app-event-type-chip [type]="row.type" />
            </td>
          </ng-container>

          <!-- Description Column -->
          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef mat-sort-header resizable [matResizableMinWidthPx]="100">Description</th>
            <td mat-cell *matCellDef="let row">{{ row.description }}</td>
          </ng-container>

          <!-- CreatedAt Column -->
          <ng-container matColumnDef="createdAt">
            <th mat-header-cell *matHeaderCellDef mat-sort-header resizable [matResizableMinWidthPx]="100">Created At</th>
            <td mat-cell *matCellDef="let row">
              <span class="mono">{{ row.createdAt }}</span>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"
              [class.new-row]="row.id === newEventId()"></tr>
        </table>
      </div>

      <mat-paginator
        [length]="(totalCount$ | async) ?? 0"
        [pageSize]="20"
        [pageSizeOptions]="[10, 20, 50]"
        [pageIndex]="((pagination$ | async)?.page ?? 1) - 1"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    }
  </div>
</app-glass-panel>
